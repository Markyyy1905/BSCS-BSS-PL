<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank - Money Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <div id="authScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md bg-white rounded-lg shadow p-8">
            <h1 class="text-2xl font-bold text-center text-blue-600 mb-8">Bank</h1>

            <div class="flex gap-2 mb-6">
                <button id="loginTabBtn" class="flex-1 py-2 px-4 bg-blue-600 text-white rounded font-semibold text-sm">Login</button>
                <button id="registerTabBtn" class="flex-1 py-2 px-4 bg-gray-200 text-gray-700 rounded font-semibold text-sm hover:bg-gray-300">Register</button>
            </div>

            <form id="loginForm" class="space-y-3">
                <input id="loginUsername" type="text" placeholder="Username" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                <input id="loginPassword" type="password" placeholder="Password" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-semibold text-sm hover:bg-blue-700">Login</button>
                <div id="loginAlert" class="hidden"></div>
            </form>

            <form id="registerForm" class="space-y-3 hidden">
                <input id="registerUsername" type="text" placeholder="Username" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                <input id="registerPassword" type="password" placeholder="Password" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                <input id="registerPasswordConfirm" type="password" placeholder="Confirm Password" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-semibold text-sm hover:bg-blue-700">Register</button>
                <div id="registerAlert" class="hidden"></div>
            </form>
        </div>
    </div>

    <div id="dashboardScreen" class="hidden min-h-screen bg-gray-50 pb-16">
        <div class="bg-blue-600 text-white p-6">
            <div class="max-w-md mx-auto">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-2xl font-bold">Wallet</h1>
                    <button id="logoutBtn" class="px-4 py-1 bg-red-500 rounded text-sm font-semibold hover:bg-red-600">Logout</button>
                </div>
                <p class="text-blue-100 text-sm">Hi, <span id="username" class="font-semibold"></span></p>
            </div>
        </div>

        <div class="max-w-md mx-auto px-4 mt-6">
            <div class="bg-white rounded-lg shadow p-6 mb-6 border-t-4 border-blue-600">
                <p class="text-gray-600 text-sm">Total Balance</p>
                <p class="text-4xl font-bold text-blue-600">$<span id="balance">0.00</span></p>
                <p class="text-gray-500 text-xs mt-2"><span id="accountTypeDisplay"></span></p>
                <p class="text-gray-500 text-xs mt-2">Account: <span id="accountNumber" class="font-mono text-gray-700"></span></p>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-8">
                <button id="depositBtn" class="bg-green-500 text-white py-3 rounded font-semibold text-sm hover:bg-green-600">Deposit</button>
                <button id="withdrawBtn" class="bg-orange-500 text-white py-3 rounded font-semibold text-sm hover:bg-orange-600">Withdraw</button>
                <button id="transferBtn" class="bg-indigo-500 text-white py-3 rounded font-semibold text-sm hover:bg-indigo-600">Transfer</button>
            </div>

            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="font-bold text-gray-800 mb-4 text-sm">Recent Transactions</h2>
                <div id="transactionList" class="space-y-3"></div>
                <p id="noTransactions" class="text-gray-500 text-sm text-center py-4">No transactions yet</p>
            </div>
        </div>
    </div>

    <div id="depositModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-end z-50">
        <div class="w-full bg-white rounded-t-lg p-6 max-h-96 overflow-y-auto">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Deposit Money</h2>
            <form id="depositForm" class="space-y-3">
                <input id="depositAmount" type="number" placeholder="Amount" step="0.01" min="0" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                <div class="flex gap-2">
                    <button type="submit" class="flex-1 bg-green-500 text-white py-2 rounded font-semibold text-sm hover:bg-green-600">Deposit</button>
                    <button type="button" onclick="document.getElementById('depositModal').classList.add('hidden')" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded font-semibold text-sm">Cancel</button>
                </div>
                <div id="depositAlert" class="hidden"></div>
            </form>
        </div>
    </div>

    <div id="withdrawModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-end z-50">
        <div class="w-full bg-white rounded-t-lg p-6 max-h-96 overflow-y-auto">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Withdraw Money</h2>
            <form id="withdrawForm" class="space-y-3">
                <input id="withdrawAmount" type="number" placeholder="Amount" step="0.01" min="0" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                <div class="flex gap-2">
                    <button type="submit" class="flex-1 bg-orange-500 text-white py-2 rounded font-semibold text-sm hover:bg-orange-600">Withdraw</button>
                    <button type="button" onclick="document.getElementById('withdrawModal').classList.add('hidden')" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded font-semibold text-sm">Cancel</button>
                </div>
                <div id="withdrawAlert" class="hidden"></div>
            </form>
        </div>
    </div>

    <div id="transferModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-end z-50">
        <div class="w-full bg-white rounded-t-lg p-6 max-h-96 overflow-y-auto">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Transfer Money</h2>
            <form id="transferForm" class="space-y-3">
                <input id="transferToUsername" type="text" placeholder="Recipient username" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                <div id="transferToInfo" class="hidden p-2 bg-green-50 text-green-700 text-sm rounded">Found user: <span id="transferToName"></span></div>
                <input id="transferAmount" type="number" placeholder="Amount" step="0.01" min="0" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                <div class="flex gap-2">
                    <button type="submit" class="flex-1 bg-indigo-500 text-white py-2 rounded font-semibold text-sm hover:bg-indigo-600">Transfer</button>
                    <button type="button" onclick="document.getElementById('transferModal').classList.add('hidden')" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded font-semibold text-sm">Cancel</button>
                </div>
                <div id="transferAlert" class="hidden"></div>
            </form>
        </div>
    </div>

    <script src="js/classes.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
